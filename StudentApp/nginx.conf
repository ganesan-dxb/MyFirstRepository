# This NGINX config is for INTERNAL use only — not in DMZ.
# It can serve static files or act as a load balancer between API instances.

events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        # If you scale to multiple API containers, add them here:
        server studentapp-api:5100;
        # server studentapp-api-2:5100;
    }

    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location /nginx-health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Proxy to API backend (used as internal load balancer)
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }
    }
}
